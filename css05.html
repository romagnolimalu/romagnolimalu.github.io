<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>CSS</title>
    <link rel="stylesheet" href="css05.css"/>
</head>
 <body>
       <p> Olá Turma!</p>
       <hr>
       <p>Exemplo de Paragrafo</p>
       <b>Texto em Negrito</b><br>
       <i>Texto em italico</i><br>
       <u>Texto com sublinhado</u><br><br>
       <hr>
       <b>Lista sem ordenação</b><br>
       <ul>
           <li style="color:black">Item 1</li>
           <li>Item 2</li>
           <li>Item 3</li>
       </ul>
       <br>
       <hr>
       <b>Lista ordenada</b><br>
       <ol>
           <li class="primeiro_item">Item 1</li>
           <li>Item 2</li>
           <li id="ultimo_item">Item 3</li>
       </ol>
   </body>
</html>
